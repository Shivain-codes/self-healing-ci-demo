name: CI with Self-Healing
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Application
        id: run_app
        run: python app.py
        continue-on-error: true # This prevents the whole workflow from stopping

      - name: Trigger Self-Heal on Failure
        if: steps.run_app.outcome == 'failure'
        env:
          ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
          ELASTIC_URL: ${{ secrets.ELASTIC_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # First, push the error to Elastic (Phase 1)
          python push_error_to_elastic.py 
          # Then, run the brain to find the fix and open PR (Phase 3 & 4)
          python self_heal_agent.py
